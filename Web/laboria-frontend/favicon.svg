<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#06b6d4" />
        </linearGradient>
    </defs>
    
    <!-- Fondo oscuro para que resalte en pestañas claras -->
    <rect width="100" height="100" rx="20" fill="#050505" />
    
    <!-- Líneas de conexión de la "L" -->
    <path d="M 30 20 L 30 75 L 75 75" fill="none" stroke="url(#blueGlow)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 30 50 L 55 40 L 65 55" fill="none" stroke="#06b6d4" stroke-width="4" stroke-dasharray="4 4" opacity="0.6" />
    
    <!-- Nodos -->
    <circle cx="30" cy="20" r="8" fill="#06b6d4" />
    <circle cx="30" cy="50" r="6" fill="#ffffff" />
    <circle cx="30" cy="75" r="10" fill="#3b82f6" />
    <circle cx="55" cy="75" r="6" fill="#06b6d4" />
    <circle cx="75" cy="75" r="8" fill="#3b82f6" />
    <circle cx="55" cy="40" r="5" fill="#3b82f6" />
</svg>
